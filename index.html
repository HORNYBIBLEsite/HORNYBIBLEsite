<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HORNYBIBLE — Переводы Манхв</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400;0,700&family=EB+Garamond:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ══ ПЕРЕМЕННЫЕ ЦВЕТОВ (HORNYBIBLE STYLE) ══ */
:root {
  --bg:       #0d0b12; /* Глубокий темный */
  --bg2:      #13101c;
  --surface:  #1c1828;
  --border:   #2e2845;
  --text:     #ede8ff;
  --text2:    #8b7fb8;
  --accent:   #e8365d; /* Розовый акцент */
  --accent-glow: rgba(232, 54, 93, 0.3);
  --gold:     #ffb800; /* Золото для админа */
}

body {
  background-color: var(--bg);
  color: var(--text);
  font-family: 'EB Garamond', serif;
  line-height: 1.6;
  margin: 0;
}

/* ══ ШАПКА В СТИЛЕ МАНХВА-ПЛАТФОРМЫ ══ */
header {
  padding: 40px 20px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(to bottom, #161221, var(--bg));
}

.brand-h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 4rem;
  color: var(--accent);
  letter-spacing: 4px;
  text-shadow: 0 0 20px var(--accent-glow);
  margin: 0;
}

/* ══ СЕТКА РАБОТ (МАНХВЫ) ══ */
.works-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 25px;
  padding: 40px;
  max-width: 1200px;
  margin: 0 auto;
}

.work-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  transition: 0.3s;
  cursor: pointer;
  position: relative;
}

.work-card:hover {
  transform: translateY(-5px);
  border-color: var(--accent);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.work-info { padding: 20px; }
.work-title { 
  font-family: 'Playfair Display', serif; 
  font-size: 1.4rem; 
  color: var(--accent);
  margin-bottom: 8px;
}

/* ══ СИСТЕМА КОММЕНТАРИЕВ ══ */
.comment {
  background: var(--bg2);
  border-radius: 8px;
  padding: 15px;
  margin-bottom: 15px;
  border-left: 3px solid var(--border);
}

.comment-admin {
  border-left-color: var(--gold);
  background: rgba(255, 184, 0, 0.05);
}

.admin-badge {
  color: var(--gold);
  font-size: 0.7rem;
  text-transform: uppercase;
  border: 1px solid var(--gold);
  padding: 2px 6px;
  border-radius: 4px;
  margin-left: 10px;
}

/* Кнопки в стиле проекта */
.btn-action {
  background: var(--accent);
  color: white;
  border: none;
  padding: 10px 20px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.2rem;
  cursor: pointer;
  border-radius: 4px;
  transition: 0.2s;
}

.btn-action:hover {
  filter: brightness(1.2);
  box-shadow: 0 0 15px var(--accent-glow);
}
</style>
</head>
<body>

<header>
  <h1 class="brand-h1">HORNYBIBLE</h1>
  <p style="color: var(--text2); letter-spacing: 2px;">ЛЮБИТЕЛЬСКИЕ ПЕРЕВОДЫ МАНХВ</p>
</header>

<nav style="display: flex; justify-content: center; gap: 30px; padding: 15px; border-bottom: 1px solid var(--border);">
  <a href="#" onclick="showPage('home')" style="color: var(--text); text-decoration: none;">ГЛАВНАЯ</a>
  <a href="#" onclick="showPage('catalog')" style="color: var(--text); text-decoration: none;">КАТАЛОГ</a>
  <a href="#" onclick="showPage('profile')" id="nav-profile" style="color: var(--accent); text-decoration: none;">ПРОФИЛЬ</a>
</nav>

<div id="page-home" class="page active">
  <div class="works-grid" id="works-list">
    </div>
</div>

<div id="reader-modal" style="display:none; position:fixed; inset:0; background:var(--bg); z-index:1000; overflow-y:auto; padding:20px;">
  <button onclick="closeReader()" class="btn-action" style="position:fixed; top:20px; right:20px;">ЗАКРЫТЬ</button>
  <div id="chapter-content" style="max-width:800px; margin: 60px auto;">
    </div>
</div>

<script>
// ТВОЙ АЙДИ АДМИНА ИЗ ПРЕДЫДУЩИХ ФАЙЛОВ
const ADMIN_UID = "REPLACE_WITH_YOUR_ADMIN_UID"; 

function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + pageId).classList.add('active');
}

  console.log("Загрузка манхв для HornyBible...");
}

// Инициализация
window.onload = () => {
  loadWorks();
};
</script>

</body>
</html>
